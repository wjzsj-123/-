name: lp-platform

services:
  mysql:
    image: mysql:8.0
    container_name: lp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Qq299157}
      MYSQL_DATABASE: lp
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - lp-net

  redis:
    image: redis:7-alpine
    container_name: lp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - lp-net

  app:
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: lp-app
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/lp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Qq299157}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-lp-platform-jwt-secret-change-in-production-2026}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS:-7}
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lp-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: lp-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8888}:80"
    depends_on:
      - app
    networks:
      - lp-net

networks:
  lp-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
