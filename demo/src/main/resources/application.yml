spring:
  # Redis 配置（本地默认 localhost:6379，生产可用环境变量覆盖）
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  # 数据库配置（本地默认 localhost；Docker 通过环境变量 DB_URL/DB_USER/DB_PASSWORD 覆盖）
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Qq299157}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # JPA 配置（可选，去除无关警告）
  jpa:
    open-in-view: false

  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    view:
      prefix: /
      suffix: .html

# MyBatis 配置（层级必须正确，与 spring 同级）
mybatis:
  mapper-locations: classpath:mapper/*.xml # 明确指定 XML 文件路径
  type-aliases-package: com.example.demo.demos.web.pojo # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印 SQL 日志（可选）

# 日志配置
logging:
  level:
    com.example.demo.demos.web.mapper: DEBUG
    org.apache.ibatis: DEBUG

# Knife4j 接口文档
knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT 配置
jwt:
  secret: ${JWT_SECRET:lp-platform-jwt-secret-change-in-production-2026}
  expiration-days: ${JWT_EXPIRATION_DAYS:7}