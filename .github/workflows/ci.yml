name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Run unit tests
        run: mvn -B clean test

      - name: Print test summary
        if: always()
        run: |
          echo "## Backend Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          if [ -d target/surefire-reports ]; then
            passed=$(grep -l 'failures="0"' target/surefire-reports/TEST-*.xml 2>/dev/null | wc -l | tr -d ' ')
            total=$(ls target/surefire-reports/TEST-*.xml 2>/dev/null | wc -l | tr -d ' ')
            echo "- Test classes: ${total}" >> "$GITHUB_STEP_SUMMARY"
            echo "- All passed: ${passed}/${total}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Modules covered: auth, user service, controller, interceptor, redis cache helper" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No surefire reports found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: demo/target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports
          path: demo/target/surefire-reports/
          retention-days: 7

      - name: Build executable JAR
        run: mvn -B -Pdocker package -DskipTests

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: demo/target/*.jar
          retention-days: 7

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
